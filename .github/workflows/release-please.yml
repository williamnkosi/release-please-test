name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Extract latest release notes
        run: |
          # Use a more robust approach to extract the latest version section
          # Find the first occurrence of ## [ and extract until the next ## [ or EOF
          python3 << 'EOF'
          import re

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          # Find all version sections (starting with ## [)
          sections = re.split(r'\n(## \[)', content)

          # If we have at least 3 parts ([0, '## [', content...])
          if len(sections) >= 3:
              # The first real version is at index 2 (after intro)
              # Take everything until the next version marker
              latest_version = sections[2]
              
              # Split by the next ## [ to get just this version's content
              if len(sections) > 4:
                  # There's another version after this one
                  latest_section = sections[3].split('\n(## \[')[0]
              else:
                  # This is the last/only version
                  latest_section = sections[3]
              
              # Reconstruct and clean up
              release_notes = ('## [' + latest_version + latest_section).strip()
          else:
              release_notes = "No release notes found"

          # Write to file
          with open('RELEASE_NOTES.txt', 'w') as f:
              f.write(release_notes)

          print("=== Extracted Release Notes ===")
          print(release_notes)
          EOF

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.txt
          retention-days: 30
